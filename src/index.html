<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GAUP - GitHub Actions Upgrader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>GAUP</h1>
    <p>Paste a GitHub Actions workflow, get every action upgraded to its latest release.</p>
  </header>

  <main>
    <div class="editor">
      <div class="panel">
        <label for="input">Input</label>
        <textarea id="input" spellcheck="false">name: Build

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Login to GCR
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
      - name: Build and push
        uses: docker/build-push-action@v2
      - name: Cache restore
        uses: actions/cache/restore@v3</textarea>
      </div>
      <div class="panel">
        <label for="output">Output</label>
        <textarea id="output" spellcheck="false" readonly></textarea>
      </div>
    </div>

    <div class="actions">
      <button id="upgrade" type="button">Upgrade</button>
      <button id="copy" type="button" disabled>Copy</button>
    </div>

    <div id="status" class="status" hidden></div>
  </main>

  <footer>
    <a href="https://github.com/rdeknijf/gaup">Source</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
